<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH | Notícias</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/assets/IcoSamCordis.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
    
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* REMOVE isso completamente */
        section {
            margin-bottom: 0;
        }

        /* Título */
        .intro {
            margin-top: 80px;
            font-size: 2.5em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Container das notícias */
        #noticias {
            width: 100%;
            max-width: 800px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Card */
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Botão editar */
        .btn-edit {
            width: 250px;
            height: 50px;
            margin: 40px auto;
            display: block;
            text-align: center;
            background: transparent;
            color: #000;
            border-radius: 8px;
            border: 2px solid #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .btn-edit:hover {
            background: #ffffff;
            transform: scale(1.05);
        }

        .btn-excluir {
            background: #b52d2a;
            color: white;
            padding: 6px 12px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn-excluir:hover {
            background: #e64542;
            transform: scale(1.05);
        }

        /* Imagem */
        .imagem-noticia {
            width: 100%;
            max-width: 300px;
            height: 450px;
            object-fit: cover;
            border-radius: 12px;
            margin: 20px auto;
            display: block;
        }

        .card {
            background: #fff;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div id="navbar"></div>

    <!--FIRST SECTION-->
    <section class="main-section" style="flex: 1;">
        <div class="first-container">
            <p class="intro" id="typewriter"></p>
        </div>        

        <div id="noticias"></div>
        <button class="btn-edit" id="menu">Editar Notícias</button>
    </section>

    <footer class="footer">
        <div class="footer-container">

            <!-- Logo -->
            <div class="footer-logo">
                <a href="/index.html">
                    <img src="/assets/SamCordis ( logo branca ).png" alt="Hospital Samcordis">
                </a>
            </div>

            <!-- Informações -->
            <div class="footer-info">
                <div class="footer-item">
                    <h4>Responsável pelo site</h4>
                    <p>Tecnologia da Informação (TI)<br><b>Ramal 2257</b></p>
                </div>

                <div class="footer-item">
                    <h4>Responsável pelo Cardápio</h4>
                    <p>Setor de Nutrição<br><b>Ramal 2220</b></p>
                </div>

                <div class="footer-item">
                    <h4>Responsável pelas Notícias</h4>
                    <p>Recursos Humanos (RH)<br><b>Ramal 2262</b></p>
                </div>
            </div>
        </div>
        <div class="footer-right">
            <p>© 2025 - 2026 | Todos os direitos reservados a equipe da TI</p>
        </div>
    </footer>

    <script>
        let noticias = [];

        fetch("noticias.json")
            .then(r => r.json())
            .then(lista => {
                noticias = lista;
                renderNoticias();
            });

        function renderNoticias() {
            const div = document.getElementById("noticias");
            div.innerHTML = "";

            noticias.forEach((n, i) => {

                const dataFmt = n.dataPublicacao
                    ? new Date(n.dataPublicacao).toLocaleString("pt-BR")
                    : "Data não informada";

                div.innerHTML += `
            <div class="card">
                <h2>${n.titulo ?? "Sem título"}</h2>

                <small style="color:#555;">
                    Publicado em: ${dataFmt}
                </small>

                ${n.imagem ?
                        `<img src="${n.imagem}" class="imagem-noticia">`
                        : ""
                    }

                <div class="mensagem">
                    ${n.mensagem ?? ""}
                </div>

                <button class="btn-excluir" onclick="excluirNoticia(${i})">
                    🗑️ Excluir
                </button>
            </div>
        `;
            });
        }

        function excluirNoticia(index) {
            if (!confirm("Tem certeza que deseja excluir esta notícia?")) return;

            fetch('/pages/SamNews/delete-noticia.php', {
                method: "POST",
                credentials: "same-origin", // ESSENCIAL
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ index: index })
            })
                .then(r => r.json())
                .then(resp => {
                    if (resp.sucesso) {
                        noticias.splice(index, 1);
                        renderNoticias();
                    } else {
                        alert("Erro ao excluir: " + resp.erro);
                    }
                });
        }


        document.getElementById("menu").addEventListener("click", () => {
            window.location.href = "/pages/SamNews/editar-noticias.html";
        });

        document.addEventListener("DOMContentLoaded", function () {
            const btnLogin = document.getElementById("btn-login");
            const btnLogout = document.getElementById("btn-logout");

            if (localStorage.getItem("logado") === "sim") {
                btnLogin.style.display = "none";
                btnLogout.style.display = "block";
            }

            btnLogout.addEventListener("click", () => {
                localStorage.removeItem("logado");
                localStorage.removeItem("nivel");
                window.location.href = "/index.html";
            });

            btnLogin.addEventListener("click", () => {
                window.location.href = "/login.html";
            });
        });

        document.addEventListener("DOMContentLoaded", () => {
            const text = "Notícias do hospital. (editável)";
            const element = document.getElementById("typewriter");
            let index = 0;

            function typeEffect() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    setTimeout(typeEffect, 40); // velocidade da digitação
                }
            }

            typeEffect();
        });
    </script>

    <script src="/js/login.js"></script>
    <script src="/js/buttons.js"></script>
    <script src="/js/navbar-loader.js"></script>
</body>

</html>
