    <script>
        fetch("/pages/SamNews/noticias.json?v=" + Date.now())
            .then(r => r.json())
            .then(lista => {

                const container = document.getElementById("noticias");
                container.innerHTML = "";

                if (lista.length > 0) {
                    const n = lista[0]; // Última notícia

                    const dataFmt = n.dataPublicacao
                        ? new Date(n.dataPublicacao).toLocaleString("pt-BR")
                        : "Data não informada";

                    container.innerHTML = `
                <article class="noticia-card">

                    <h2>${n.titulo ?? "Sem título"}</h2>

                    <small style="color:#555;">
                        Publicado em: ${dataFmt}
                    </small>

                    ${n.imagem
                            ? `<img src="/pages/SamNews/${n.imagem}" class="imagem-noticia">`
                            : ""
                        }

                    <div class="noticia-texto">
                        ${n.mensagem ?? ""}
                    </div>

                    <button class="noticia-btn"
                        onclick="window.location.href='/pages/SamNews/ver-noticias.html'">
                        Ver notícia
                    </button>

                </article>
            `;
                }
            });        

        document.addEventListener("DOMContentLoaded", () => {
            const text = "SEJA BEM-VINDO AO PORTAL INTERNO DO HOSPITAL SAMCORDIS. PROFISSIONAL DA NUTRIÇÃO!";
            const element = document.getElementById("typewriter");
            let index = 0;

            function typeEffect() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    setTimeout(typeEffect, 30); // velocidade da digitação
                }
            }

            typeEffect();
        });
    </script>
